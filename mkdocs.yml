site_name: Pegium
site_description: C++20 toolkit for building parsers, AST/CST pipelines, validation, references, formatting, and language servers.
site_url: https://ydaveluy.github.io/pegium/
repo_url: https://github.com/ydaveluy/pegium
repo_name: ydaveluy/pegium
edit_uri: edit/main/docs/
docs_dir: docs
site_dir: site
strict: true

theme:
  name: material
  language: en
  custom_dir: overrides
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link
    - content.action.edit
    - content.action.view
  palette:
    - scheme: default
      primary: blue grey
      accent: light blue

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.snippets:
      base_path:
        - .

extra_css:
  - stylesheets/extra.css

nav:
  - Home: index.md
  - Introduction:
      - What is Pegium?: introduction/index.md
      - Choose Your Path: introduction/choose-your-path.md
      - Features: introduction/features.md
      - Showcases: introduction/showcases.md
      - Why Pegium: introduction/why-pegium.md
      - Pegium for Langium Users: introduction/langium-users.md
  - Learn:
      - learn/index.md
      - Workflow:
          - learn/workflow/index.md
          - 1. Build the Repository: learn/workflow/install.md
          - 2. Choose a Starting Point: learn/workflow/scaffold.md
          - 3. Write the Grammar: learn/workflow/write_grammar.md
          - 4. Shape the AST and CST: learn/workflow/generate_ast.md
          - 5. Resolve Cross-References: learn/workflow/resolve_cross_references.md
          - 6. Create Validations: learn/workflow/create_validations.md
          - 7. Add Formatting and LSP Services: learn/workflow/generate_everything.md
  - Reference:
      - reference/index.md
      - Start Here: reference/start-here.md
      - Glossary: reference/glossary.md
      - Configuration Services: reference/configuration-services.md
      - Document Lifecycle: reference/document-lifecycle.md
      - Semantic Model: reference/semantic-model.md
      - Grammar Reference: reference/grammar-reference.md
      - Parser Contracts: reference/parser-contracts.md
      - Services and Modules: reference/services-and-modules.md
      - Formatter DSL: reference/formatter-dsl.md
      - Default LSP Services: reference/lsp-services.md
      - Completion Provider: reference/completion-provider.md
      - Workspace Concepts: reference/workspace.md
  - Recipes:
      - recipes/index.md
      - Multiple Languages: recipes/multiple-languages.md
      - Formatting: recipes/custom-formatter.md
      - Scoping:
          - recipes/scoping/index.md
          - Qualified Names: recipes/scoping/qualified-names.md
          - Custom Scope Provider: recipes/custom-scope-provider.md
      - Validation:
          - recipes/validation/index.md
          - Dependency Loops: recipes/validation/dependency-loops.md
          - Custom Validator: recipes/custom-validator.md
      - Performance:
          - recipes/performance/index.md
          - Caches: recipes/performance/caches.md
      - Custom LSP Features: recipes/custom-lsp-features.md
  - Examples:
      - examples/index.md
      - Arithmetics: examples/arithmetics.md
      - DomainModel: examples/domainmodel.md
      - Requirements: examples/requirements.md
      - Statemachine: examples/statemachine.md
