name: scaffold-smoke

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scaffold-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Freshness guard
        run: |
          cmake -DPEGIUM_TAG=main -P cmake/GenerateScaffold.cmake
          git diff --exit-code docs/pegium-new.cmake \
            || (echo "docs/pegium-new.cmake is stale; re-run: cmake -DPEGIUM_TAG=main -P cmake/GenerateScaffold.cmake"; exit 1)

      - name: Scaffold a project
        run: cmake -DNAME=Smoke -DDIR=$RUNNER_TEMP/smoke -DPEGIUM_TAG=${{ github.sha }} -P docs/pegium-new.cmake

      - name: Build + test the scaffolded project against this pegium
        working-directory: ${{ runner.temp }}/smoke
        run: |
          cmake -B build -DFETCHCONTENT_SOURCE_DIR_PEGIUM=$GITHUB_WORKSPACE
          cmake --build build -j
          ctest --test-dir build --output-on-failure
