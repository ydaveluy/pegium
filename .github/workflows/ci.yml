name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - compiler: gcc
            cxx: g++
            build_type: Debug
            build_fuzz_targets: OFF
            fuzztest_fuzzing_mode: OFF
            run_guided_fuzz: false
          - compiler: gcc
            cxx: g++
            build_type: Release
            build_fuzz_targets: OFF
            fuzztest_fuzzing_mode: OFF
            run_guided_fuzz: false
          - compiler: clang
            cxx: clang++
            build_type: Debug
            build_fuzz_targets: OFF
            fuzztest_fuzzing_mode: OFF
            run_guided_fuzz: false
          - compiler: clang
            cxx: clang++
            build_type: Release
            build_fuzz_targets: ON
            fuzztest_fuzzing_mode: ON
            run_guided_fuzz: true
    steps:
      - uses: actions/checkout@v6
      - name: Configure
        env:
          CC: ${{ matrix.compiler }}
          CXX: ${{ matrix.cxx }}
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DPEGIUM_BUILD_EXAMPLES=ON \
            -DPEGIUM_BUILD_FUZZ_TARGETS=${{ matrix.build_fuzz_targets }} \
            -DFUZZTEST_FUZZING_MODE=${{ matrix.fuzztest_fuzzing_mode }}
      - name: Build
        run: |
          targets=(
            PegiumCoreUnitTest
            PegiumLspUnitTest
            PegiumIntegrationTest
            pegium-example-arithmetics-test
            pegium-example-domainmodel-test
            pegium-example-requirements-test
            pegium-example-statemachine-test
          )
          if [ "${{ matrix.build_fuzz_targets }}" = "ON" ]; then
            targets+=(
              PegiumWorkspaceFuzzTest
            )
          fi
          cmake --build build --config ${{ matrix.build_type }} -j4 --target "${targets[@]}"
      - name: Run core tests
        run: ctest --test-dir build -L core --output-on-failure
      - name: Run LSP tests
        run: ctest --test-dir build -L lsp --output-on-failure
      - name: Run integration tests
        run: ctest --test-dir build -L integration --output-on-failure
      - name: Run example tests
        run: ctest --test-dir build -L example --output-on-failure
      - name: Run guided fuzz sanity
        if: ${{ matrix.run_guided_fuzz }}
        run: ctest --test-dir build -L fuzz-guided --output-on-failure

  sanitizers:
    runs-on: ubuntu-latest
    env:
      UBSAN_OPTIONS: print_stacktrace=1
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: asan
            cxx: clang++
            flags: -DPEGIUM_ENABLE_ASAN=ON
          - name: ubsan
            cxx: clang++
            flags: -DPEGIUM_ENABLE_UBSAN=ON
    steps:
      - uses: actions/checkout@v6
      - name: Configure
        env:
          CC: clang
          CXX: ${{ matrix.cxx }}
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Debug \
            -DPEGIUM_BUILD_EXAMPLES=OFF \
            -DPEGIUM_BUILD_FUZZ_TARGETS=OFF \
            ${{ matrix.flags }}
      - name: Build
        run: cmake --build build --config Debug -j4 --target PegiumCoreUnitTest PegiumLspUnitTest
      - name: Run sanitizer-focused tests
        run: ctest --test-dir build -R 'PegiumCoreParserFocusedSanitizer|PegiumLspSemanticTokenSanitizer' --output-on-failure
